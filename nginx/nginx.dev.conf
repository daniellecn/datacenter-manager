events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone — permissive limits in dev to avoid friction.
    # Zone name matches production so config stays symmetric.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=60r/m;

    upstream backend {
        server backend:8000;
    }

    # Vite dev server
    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        # Auth endpoints — rate limited (permissive in dev)
        location ~ ^/api/v1/auth/(login|refresh)$ {
            limit_req zone=auth burst=30 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # FastAPI — API routes
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # FastAPI — OpenAPI docs
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # FastAPI — health and readiness probes
        location ~ ^/(health|readiness)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # Vite dev server — WebSocket upgrade required for Hot Module Replacement
        location / {
            proxy_pass             http://frontend;
            proxy_set_header       Host              $host;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_http_version     1.1;
        }
    }
}
