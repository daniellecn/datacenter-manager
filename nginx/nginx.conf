events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Auth endpoints (login, refresh): 10 req/min per IP — brute-force protection.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # Password change: 5 req/min per IP — separate from login to prevent bypass.
    limit_req_zone $binary_remote_addr zone=password:10m rate=5r/m;
    # Search: 30 req/min per IP — prevents DB exhaustion via repeated ILIKE queries.
    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;
    # General API: 300 req/min per IP — broad resource exhaustion protection.
    limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # TLS configuration.
        # For a self-signed cert (dev/test):
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #     -keyout nginx/certs/server.key -out nginx/certs/server.crt \
        #     -subj "/CN=datacenter-manager"
        # For production, replace with a cert signed by your internal CA.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────────
        # HSTS: preload enables browser-list inclusion (removes data: from img-src).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        # CSP: data: URIs removed from img-src — they can be used for exfiltration.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

        # ── Auth login + refresh — strict rate limit ──────────────────────────────
        location ~ ^/api/v1/auth/(login|refresh)$ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Password change — separate rate limit ─────────────────────────────────
        location = /api/v1/auth/change-password {
            limit_req zone=password burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Global search — rate limited to prevent DB exhaustion ─────────────────
        location = /api/v1/search {
            limit_req zone=search burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── FastAPI — all other API routes ────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── FastAPI — OpenAPI docs ────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── FastAPI — health and readiness probes ─────────────────────────────────
        location ~ ^/(health|readiness)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── React SPA — everything else ───────────────────────────────────────────
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }
}
