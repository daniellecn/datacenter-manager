events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting — 10 requests per minute per IP on auth endpoints.
    # burst=5 allows a short burst without immediate 429; nodelay serves burst immediately.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # TLS configuration.
        # For a self-signed cert (dev/test):
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #     -keyout nginx/certs/server.key -out nginx/certs/server.crt \
        #     -subj "/CN=datacenter-manager"
        # For production, replace with a cert signed by your internal CA.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

        # ── Auth endpoints — rate limited ─────────────────────────────────────────
        location ~ ^/api/v1/auth/(login|refresh)$ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── FastAPI — all other API routes ────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── FastAPI — OpenAPI docs ────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── FastAPI — health and readiness probes ─────────────────────────────────
        location ~ ^/(health|readiness)$ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # ── React SPA — everything else ───────────────────────────────────────────
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }
}
