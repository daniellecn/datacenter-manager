# Dev overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      target: dev
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG

  frontend:
    build:
      target: dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    # Override the production nginx.conf with the dev config.
    # Dev config: HTTP only, proxies /api/ to backend and / to Vite dev server (with HMR).
    # The certs volume from the base file is still mounted but unused by the dev config.
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
